<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Header Modifier</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="app-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
        <span class="app-name">Header Modifier</span>
      </div>
      <label class="toggle" title="Enable / Disable">
        <input type="checkbox" id="masterToggle">
        <span class="thumb"></span>
      </label>
    </header>

    <nav class="tab-bar" id="tabBar"></nav>

    <main class="content">
      <div class="rows-list" id="headersList"></div>
      <button class="btn-add-row" id="addBtn">+ Add Request Header</button>
    </main>

  </div>
  <script src="popup.js"></script>
</body>
</html>
